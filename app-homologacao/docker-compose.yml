version: "3.9"

services:
  # ================== Backend API ==================
  backend:
    build: ./backend
    container_name: techcorp-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=techcorp_homologacao
      - DB_USER=app_user
      - DB_PASSWORD=secure_password_2024
      - APP_VERSION=1.0.0
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ================== Frontend ==================
  frontend:
    build: ./frontend
    container_name: techcorp-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  # ================== Banco de Dados ==================
  db:
    image: mysql:8.0
    container_name: techcorp-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_2024
      MYSQL_DATABASE: techcorp_homologacao
      MYSQL_USER: app_user
      MYSQL_PASSWORD: secure_password_2024
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
