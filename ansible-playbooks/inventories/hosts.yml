---
# Inventário de hosts para os cenários
#
# Ajuste os IPs e variáveis conforme seu ambiente

all:
  children:
    # Máquinas de desenvolvimento (Cenário 1)
    dev_machines:
      hosts:
        dev01:
          ansible_host: 192.168.13.203
          ansible_user: sysadmin
          dev_name: "Dev 01 - Backend"
          dev_email: "dev01@techcorp.com.br"
          dev_stack: backend
        dev02:
          ansible_host: 192.168.13.204
          ansible_user: sysadmin
          dev_name: "Dev 02 - Frontend"
          dev_email: "dev02@techcorp.com.br"
          dev_stack: frontend

    # Servidor de homologação (Cenário 2)
    staging_server:
      hosts:
        homologacao:
          ansible_host: 192.168.13.150
          ansible_user: sysadmin

    # Operação (control node)
    operacao:
      hosts:
        operacao:
          ansible_host: 192.168.13.151
          ansible_user: sysadmin

    # Servidor DNS (bind9)
    dns_servers:
      hosts:
        dns:
          ansible_host: 192.168.13.53
          ansible_user: sysadmin

    # Servidor GitLab (código/CI)
    gitlab_servers:
      hosts:
        gitlab:
          ansible_host: 192.168.13.202
          ansible_user: sysadmin

    # Servidor Web (nginx)
    web_servers:
      hosts:
        webserver:
          ansible_host: 192.168.13.140
          ansible_user: sysadmin

    # Servidor de Banco (MariaDB)
    db_servers:
      hosts:
        dbserver:
          ansible_host: 192.168.13.201
          ansible_user: sysadmin

  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
