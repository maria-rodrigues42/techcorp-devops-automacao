---
# CENÁRIO 2: Deploy Automatizado no Ambiente de Homologação
#
# Uso: ansible-playbook -i inventories/hosts.yml cenario2-deploy-staging.yml
#
# O que este playbook faz:
#   1. Conecta ao servidor de Homologação
#   2. Faz pull da versão mais recente do código no GitLab
#   3. Derruba containers antigos da aplicação
#   4. Sobe novos containers com a versão atualizada
#   5. Garante comunicação com o banco de dados
#   6. Verifica se a aplicação está respondendo
#
- name: "Cenário 2 - Deploy Automatizado no Ambiente de Homologação"
  hosts: staging_server
  become: yes
  vars:
    # Configurações do repositório
    gitlab_url: "https://gitlab.techcorp.com.br"
    repo_url: "{{ gitlab_url }}/devops/app-homologacao.git"
    repo_branch: "main"
    app_dir: "/opt/app-homologacao"

    # Configurações dos containers
    app_name: "techcorp-app"
    app_port: 8080
    frontend_port: 80
    db_port: 3306

    # Configurações do banco de dados
    db_name: "techcorp_homologacao"
    db_user: "app_user"
    db_password: "secure_password_2024"
    db_root_password: "root_password_2024"

    # Versão da aplicação (pode ser sobrescrita via --extra-vars)
    app_version: "latest"

  tasks:
    # ================== FASE 1: Preparação ==================
    - name: "1.1 - Criar diretório da aplicação"
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: "1.2 - Verificar se o Git está instalado"
      command: git --version
      register: git_check
      changed_when: false

    - name: "1.3 - Verificar se o Docker está instalado"
      command: docker --version
      register: docker_check
      changed_when: false

    # ================== FASE 2: Clone/Pull do Código ==================
    - name: "2.1 - Verificar se o repositório já existe"
      stat:
        path: "{{ app_dir }}/.git"
      register: repo_stat

    - name: "2.2 - Clonar repositório (primeira vez)"
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_branch }}"
        force: yes
      when: not repo_stat.stat.exists

    - name: "2.3 - Atualizar repositório (pull)"
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_branch }}"
        force: yes
      when: repo_stat.stat.exists

    - name: "2.4 - Mostrar última versão deployada"
      command: "git log --oneline -1"
      args:
        chdir: "{{ app_dir }}"
      register: git_log
      changed_when: false

    - name: "2.5 - Exibir versão do código"
      debug:
        msg: "Versão deployada: {{ git_log.stdout }}"

    # ================== FASE 3: Parar Containers Antigos ==================
    - name: "3.1 - Parar containers da aplicação anteriores"
      community.docker.docker_container:
        name: "{{ item }}"
        state: absent
      loop:
        - "{{ app_name }}-backend"
        - "{{ app_name }}-frontend"
        - "{{ app_name }}-db"
      ignore_errors: yes

    - name: "3.2 - Remover imagens antigas"
      community.docker.docker_image:
        name: "{{ item }}"
        state: absent
      loop:
        - "{{ app_name }}-backend:previous"
        - "{{ app_name }}-frontend:previous"
      ignore_errors: yes

    # ================== FASE 4: Build e Deploy ==================
    - name: "4.1 - Build da imagem backend"
      community.docker.docker_image:
        name: "{{ app_name }}-backend"
        tag: "{{ app_version }}"
        source: build
        build:
          path: "{{ app_dir }}/backend"
          dockerfile: Dockerfile
        force_source: yes

    - name: "4.2 - Build da imagem frontend"
      community.docker.docker_image:
        name: "{{ app_name }}-frontend"
        tag: "{{ app_version }}"
        source: build
        build:
          path: "{{ app_dir }}/frontend"
          dockerfile: Dockerfile
        force_source: yes

    - name: "4.3 - Criar rede Docker para a aplicação"
      community.docker.docker_network:
        name: "{{ app_name }}-network"
        state: present

    - name: "4.4 - Subir container do Banco de Dados"
      community.docker.docker_container:
        name: "{{ app_name }}-db"
        image: mysql:8.0
        state: started
        restart_policy: always
        networks:
          - name: "{{ app_name }}-network"
        env:
          MYSQL_ROOT_PASSWORD: "{{ db_root_password }}"
          MYSQL_DATABASE: "{{ db_name }}"
          MYSQL_USER: "{{ db_user }}"
          MYSQL_PASSWORD: "{{ db_password }}"
        ports:
          - "{{ db_port }}:3306"
        volumes:
          - "{{ app_name }}-db-data:/var/lib/mysql"

    - name: "4.5 - Aguardar MySQL estar pronto"
      command: "docker exec {{ app_name }}-db mysqladmin ping -h localhost -u root -p{{ db_root_password }}"
      register: mysql_ping
      retries: 30
      delay: 2
      until: mysql_ping.rc == 0

    - name: "4.6 - Subir container Backend"
      community.docker.docker_container:
        name: "{{ app_name }}-backend"
        image: "{{ app_name }}-backend:{{ app_version }}"
        state: started
        restart_policy: always
        networks:
          - name: "{{ app_name }}-network"
        env:
          DB_HOST: "{{ app_name }}-db"
          DB_PORT: "3306"
          DB_NAME: "{{ db_name }}"
          DB_USER: "{{ db_user }}"
          DB_PASSWORD: "{{ db_password }}"
          APP_VERSION: "{{ app_version }}"
        ports:
          - "{{ app_port }}:8080"

    - name: "4.7 - Subir container Frontend"
      community.docker.docker_container:
        name: "{{ app_name }}-frontend"
        image: "{{ app_name }}-frontend:{{ app_version }}"
        state: started
        restart_policy: always
        networks:
          - name: "{{ app_name }}-network"
        ports:
          - "{{ frontend_port }}:80"

    # ================== FASE 5: Verificação ==================
    - name: "5.1 - Verificar status dos containers"
      community.docker.docker_container_info:
        name: "{{ item }}"
      register: container_status
      loop:
        - "{{ app_name }}-db"
        - "{{ app_name }}-backend"
        - "{{ app_name }}-frontend"

    - name: "5.2 - Exibir status dos containers"
      debug:
        msg: "Container {{ item.item }}: {{ item.container.State.Status }}"
      loop: "{{ container_status.results }}"

    - name: "5.3 - Verificar conectividade com o banco"
      command: "docker exec {{ app_name }}-backend ping -c 1 {{ app_name }}-db"
      register: db_ping
      changed_when: false
      retries: 5
      delay: 3
      until: db_ping.rc == 0

    - name: "5.4 - Testar endpoint da aplicação"
      uri:
        url: "http://localhost:{{ app_port }}/api/health"
        method: GET
        status_code: 200
      register: health_check
      retries: 10
      delay: 5
      until: health_check.status == 200
      ignore_errors: yes

    - name: "5.5 - Criar script de verificação"
      copy:
        dest: "/opt/verificar-deploy.sh"
        mode: '0755'
        content: |
          #!/bin/bash
          echo "=========================================="
          echo "  Verificação do Deploy - Homologação"
          echo "  Versão: {{ app_version }}"
          echo "=========================================="
          echo ""
          echo "Status dos containers:"
          docker ps --filter "name={{ app_name }}" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "Teste de saúde:"
          curl -s http://localhost:{{ app_port }}/api/health | jq . 2>/dev/null || echo "Backend não respondeu"
          echo ""
          echo "Logs recentes (últimas 10 linhas):"
          docker logs {{ app_name }}-backend --tail 10
          echo ""
          echo "=========================================="
          echo "  Deploy concluído!"
          echo "=========================================="

    - name: "5.6 - Executar verificação final"
      command: /opt/verificar-deploy.sh
      register: deploy_check
      changed_when: false

  post_tasks:
    - name: "RESUMO DO DEPLOY"
      debug:
        msg: |
          ==========================================
            DEPLOY CONCLUÍDO COM SUCESSO!
          ==========================================
          Aplicação: {{ app_name }}
          Versão: {{ app_version }}
          Frontend: http://{{ ansible_default_ipv4.address }}:{{ frontend_port }}
          Backend API: http://{{ ansible_default_ipv4.address }}:{{ app_port }}/api
          Banco de Dados: {{ ansible_default_ipv4.address }}:{{ db_port }}
          ==========================================

  handlers:
    - name: restart docker
      service:
        name: docker
        state: restarted
